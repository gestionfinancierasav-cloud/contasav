<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Clientes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-50 p-8 font-sans min-h-screen">

    <div class="max-w-6xl mx-auto bg-white p-8 rounded-2xl shadow-lg border-t-4 border-pink-500">
        
        <!-- Encabezado -->
        <div class="flex justify-between items-center mb-6 border-b pb-4 border-pink-100">
            <h2 class="text-3xl font-bold text-pink-700">Directorio de Clientes</h2>
            <!-- Botón para volver al formulario (asumiendo que se llama index.html) -->
            <a href="index.html" class="px-5 py-2 bg-pink-600 text-white rounded-lg hover:bg-pink-700 transition duration-200 shadow-sm font-medium">
                + Nuevo Cliente
            </a>
        </div>

        <!-- Contenedor de la tabla -->
        <div class="overflow-x-auto rounded-lg border border-pink-100 shadow-sm">
            <table class="min-w-full bg-white">
                <thead class="bg-pink-100">
                    <tr>
                        <th class="py-3 px-4 text-left text-xs font-semibold text-pink-800 uppercase tracking-wider">Nombre Completo</th>
                        <th class="py-3 px-4 text-left text-xs font-semibold text-pink-800 uppercase tracking-wider">Documento</th>
                        <th class="py-3 px-4 text-left text-xs font-semibold text-pink-800 uppercase tracking-wider">Contacto</th>
                        <th class="py-3 px-4 text-left text-xs font-semibold text-pink-800 uppercase tracking-wider">Ocupación</th>
                        <th class="py-3 px-4 text-left text-xs font-semibold text-pink-800 uppercase tracking-wider">Fecha Registro</th>
                    </tr>
                </thead>
                <tbody id="tabla-clientes" class="divide-y divide-pink-50">
                    <!-- Fila de carga (se eliminará cuando lleguen los datos) -->
                    <tr id="fila-carga">
                        <td colspan="5" class="py-8 text-center text-pink-500 font-medium">
                            Cargando clientes...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- Mensaje de estado por si no hay datos o hay error -->
        <div id="mensaje-estado" class="hidden text-center py-6 text-gray-500"></div>

    </div>

    <!-- 1. Importar el cliente de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 2. Configura tus credenciales de Supabase
        // RECUERDA PONER TUS CREDENCIALES REALES AQUÍ TAMBIÉN
        const supabaseUrl = 'TU_URL_DE_SUPABASE'; 
        const supabaseKey = 'TU_CLAVE_ANON_PUBLICA';
        
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // 3. Función para formatear fechas
        function formatearFecha(fechaIso) {
            const fecha = new Date(fechaIso);
            return fecha.toLocaleDateString('es-ES', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        // 4. Función para cargar los datos
        async function cargarClientes() {
            const tbody = document.getElementById('tabla-clientes');
            const filaCarga = document.getElementById('fila-carga');
            const mensajeEstado = document.getElementById('mensaje-estado');

            try {
                // Hacer la consulta a Supabase ordenando por los más recientes
                const { data, error } = await supabase
                    .from('TblCliente')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                // Eliminar el mensaje de "Cargando..."
                if (filaCarga) filaCarga.remove();

                if (data.length === 0) {
                    mensajeEstado.textContent = "Aún no hay clientes registrados.";
                    mensajeEstado.classList.remove('hidden');
                    return;
                }

                // Generar las filas de la tabla dinámicamente
                data.forEach(cliente => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-pink-50 transition duration-150";

                    // Manejo de valores nulos o vacíos
                    const nombres = cliente.Nombres || '';
                    const apellidos = cliente.Apellido || '';
                    const nombreCompleto = `${nombres} ${apellidos}`.trim() || 'Sin nombre';
                    const tipoDoc = cliente['Tipo Documento'] || '';
                    const numDoc = cliente.Documento || 'N/A';
                    const correo = cliente.Correo || 'Sin correo';
                    const telefono = cliente.Telefono || 'Sin teléfono';
                    const ocupacion = cliente.Ocupacion || '-';

                    tr.innerHTML = `
                        <td class="py-3 px-4 text-sm text-gray-800 font-medium">${nombreCompleto}</td>
                        <td class="py-3 px-4 text-sm text-gray-600">
                            <span class="text-xs bg-pink-100 text-pink-800 px-2 py-1 rounded mr-1">${tipoDoc}</span> 
                            ${numDoc}
                        </td>
                        <td class="py-3 px-4 text-sm text-gray-600">
                            <div>${correo}</div>
                            <div class="text-xs text-gray-400 mt-1">${telefono}</div>
                        </td>
                        <td class="py-3 px-4 text-sm text-gray-600">${ocupacion}</td>
                        <td class="py-3 px-4 text-sm text-gray-500">${formatearFecha(cliente.created_at)}</td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (err) {
                console.error("Error al cargar clientes:", err);
                if (filaCarga) filaCarga.remove();
                mensajeEstado.textContent = "Ocurrió un error al cargar la información: " + err.message;
                mensajeEstado.classList.remove('hidden');
                mensajeEstado.classList.add('text-red-500');
            }
        }

        // 5. Ejecutar la función cuando la página cargue
        document.addEventListener('DOMContentLoaded', cargarClientes);
    </script>
</body>
</html>
