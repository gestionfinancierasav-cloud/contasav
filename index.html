<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Nuevo Cliente</title>
    <!-- Tailwind CSS por CDN para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">Registro de Nuevo Cliente</h2>
        
        <form id="form-cliente" class="space-y-6">
            <!-- Contenedor en cuadrícula para dos columnas -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <!-- Nombres -->
                <div>
                    <label for="Nombres" class="block text-sm font-medium text-gray-700 mb-1">Nombres</label>
                    <input type="text" id="Nombres" name="Nombres" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Apellido -->
                <div>
                    <label for="Apellido" class="block text-sm font-medium text-gray-700 mb-1">Apellido</label>
                    <input type="text" id="Apellido" name="Apellido" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Tipo Documento (Requerido) -->
                <div>
                    <label for="Tipo_Documento" class="block text-sm font-medium text-gray-700 mb-1">Tipo de Documento <span class="text-red-500">*</span></label>
                    <select id="Tipo_Documento" name="Tipo Documento" required class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Seleccione una opción...</option>
                        <option value="CC">Cédula de Ciudadanía</option>
                        <option value="NIT">NIT</option>
                        <option value="CE">Cédula de Extranjería</option>
                        <option value="TI">Tarjeta de Identidad</option>
                        <option value="Pasaporte">Pasaporte</option>
                    </select>
                </div>

                <!-- Documento -->
                <div>
                    <label for="Documento" class="block text-sm font-medium text-gray-700 mb-1">Número de Documento</label>
                    <input type="text" id="Documento" name="Documento" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Correo -->
                <div>
                    <label for="Correo" class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                    <input type="email" id="Correo" name="Correo" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Teléfono -->
                <div>
                    <label for="Telefono" class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
                    <input type="number" id="Telefono" name="Telefono" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Tipo Persona -->
                <div>
                    <label for="TipoPersona" class="block text-sm font-medium text-gray-700 mb-1">Tipo de Persona (ID)</label>
                    <input type="number" id="TipoPersona" name="TipoPersona" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej: 1 para Natural">
                </div>

                <!-- Tipo Cliente -->
                <div>
                    <label for="TipoCliente" class="block text-sm font-medium text-gray-700 mb-1">Tipo de Cliente (ID)</label>
                    <input type="number" id="TipoCliente" name="TipoCliente" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Ocupación -->
                <div>
                    <label for="Ocupacion" class="block text-sm font-medium text-gray-700 mb-1">Ocupación</label>
                    <input type="text" id="Ocupacion" name="Ocupacion" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- PS_Dian -->
                <div>
                    <label for="PS_Dian" class="block text-sm font-medium text-gray-700 mb-1">PS DIAN</label>
                    <input type="text" id="PS_Dian" name="PS_Dian" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <!-- Botones de acción -->
            <div class="mt-8 flex justify-end space-x-4 border-t pt-4">
                <button type="reset" class="px-6 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 transition duration-200">Limpiar</button>
                <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200">Guardar Cliente</button>
            </div>
        </form>
    </div>

    <!-- 1. Importar el cliente de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 2. Configura tus credenciales de Supabase
        // REEMPLAZA ESTOS VALORES CON LOS DE TU PANEL DE SUPABASE (Settings -> API)
        const supabaseUrl = 'TU_URL_DE_SUPABASE'; 
        const supabaseKey = 'TU_CLAVE_ANON_PUBLICA';
        
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // 3. Manejar el evento del formulario
        document.getElementById('form-cliente').addEventListener('submit', async function(event) {
            event.preventDefault(); // Evita que la página se recargue

            // Cambiar el texto del botón mientras guarda
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.innerText;
            submitBtn.innerText = 'Guardando...';
            submitBtn.disabled = true;

            // Obtener los datos del formulario
            const formData = new FormData(this);
            
            // Construir el objeto con los nombres exactos de las columnas en BD
            const clienteData = {
                Nombres: formData.get('Nombres') || null,
                Apellido: formData.get('Apellido') || null,
                "Tipo Documento": formData.get('Tipo Documento'), 
                Documento: formData.get('Documento') || null,
                Correo: formData.get('Correo') || null,
                Telefono: formData.get('Telefono') ? parseInt(formData.get('Telefono')) : null,
                TipoPersona: formData.get('TipoPersona') ? parseInt(formData.get('TipoPersona')) : null,
                TipoCliente: formData.get('TipoCliente') ? parseInt(formData.get('TipoCliente')) : null,
                Ocupacion: formData.get('Ocupacion') || null,
                PS_Dian: formData.get('PS_Dian') || null
            };

            // 4. Insertar en Supabase
            const { data, error } = await supabase
                .from('TblCliente')
                .insert([clienteData]);

            // Restaurar botón
            submitBtn.innerText = originalBtnText;
            submitBtn.disabled = false;

            if (error) {
                console.error('Error al guardar:', error);
                alert('Hubo un error al guardar el cliente: ' + error.message);
            } else {
                alert('Cliente guardado exitosamente');
                this.reset(); // Limpia el formulario
            }
        });
    </script>
</body>
</html>
